<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Chat Test</title>
  <script src="https://media.twiliocdn.com/sdk/js/conversations/v2.4/twilio-conversations.min.js"></script>
</head>
<body>
  <h1>LocSync Chat</h1>
  <div id="messages" style="border: 1px solid black; height: 400px; overflow-y: auto; padding: 10px; margin-bottom: 10px;"></div>
  <input type="text" id="input" style="width: 300px;">
  <button id="send">Send</button>

  <script>
    const API = 'https://locsync-voice-bot.onrender.com';
    const TENANT = 'TENANT-136';
    
    let client = null;
    let conversation = null;
    
    const msgs = document.getElementById('messages');
    const inp = document.getElementById('input');
    const btn = document.getElementById('send');
    
    // Get access token and start
    fetch(`${API}/webchat/${TENANT}/token`, { method: 'POST' })
      .then(r => r.json())
      .then(async d => {
        log('Connecting...');
        
        // Initialize Twilio Conversations client
        client = await Twilio.Conversations.Client.create(d.token);
        
        // Get or create conversation
        conversation = await client.getConversationBySid(d.conversationSid);
        
        // Listen for new messages in real-time
        conversation.on('messageAdded', (message) => {
          if (message.author !== 'website_user') {
            log('Bot: ' + message.body);
          }
        });
        
        log('Connected! Type a message.');
      })
      .catch(err => log('Error: ' + err.message));
    
    // Send message
    btn.onclick = async () => {
      const text = inp.value.trim();
      if (!text || !conversation) return;
      
      log('You: ' + text);
      inp.value = '';
      
      await conversation.sendMessage(text);
    };
    
    inp.onkeypress = (e) => { if (e.key === 'Enter') btn.click(); };
    
    function log(text) {
      msgs.innerHTML += text + '<br>';
      msgs.scrollTop = msgs.scrollHeight;
    }
  </script>
</body>
</html>
