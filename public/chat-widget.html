    <!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Chat Test</title>
</head>
<body>
  <h1>LocSync Chat Test</h1>
  <div id="messages" style="border: 1px solid black; height: 400px; overflow-y: auto; padding: 10px; margin-bottom: 10px;"></div>
  <input type="text" id="input" style="width: 300px;">
  <button id="send">Send</button>

  <script>
    const API = 'https://locsync-voice-bot.onrender.com';
    const TENANT = 'TENANT-136';
    
    let token = null;
    let convo = null;
    let seenIndices = new Set();
    
    const msgs = document.getElementById('messages');
    const inp = document.getElementById('input');
    const btn = document.getElementById('send');
    
    // Start
    fetch(`${API}/webchat/${TENANT}/start`, { method: 'POST' })
      .then(r => r.json())
      .then(d => {
        token = d.sessionToken;
        convo = d.conversationSid;
        log('Connected');
        setTimeout(check, 1000);
      });
    
    // Send
    btn.onclick = () => {
      const text = inp.value.trim();
      if (!text) return;
      
      log('You: ' + text);
      inp.value = '';
      
      fetch(`${API}/webchat/${TENANT}/send`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sessionToken: token, message: text })
      }).then(() => setTimeout(check, 2000));
    };
    
    inp.onkeypress = (e) => { if (e.key === 'Enter') btn.click(); };
    
    // Check messages
    function check() {
      if (!convo) return;
      
      fetch(`${API}/webchat/${TENANT}/messages?conversationSid=${convo}&sessionToken=${token}`)
        .then(r => r.json())
        .then(d => {
          if (d.messages) {
            d.messages.forEach(m => {
              if (m.author === 'locsync_ai' && !seenIndices.has(m.index)) {
                log('Bot: ' + m.body);
                seenIndices.add(m.index);
              }
            });
          }
        });
    }
    
    function log(text) {
      msgs.innerHTML += text + '<br>';
      msgs.scrollTop = msgs.scrollHeight;
    }
  </script>
</body>
</html>
