<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Chat Test</title>
  <script src="https://media.twiliocdn.com/sdk/js/conversations/v2.4/twilio-conversations.min.js"></script>
</head>
<body>
  <h1>LocSync Chat</h1>
  <div id="messages" style="border: 1px solid black; height: 400px; overflow-y: auto; padding: 10px; margin-bottom: 10px;"></div>
  <input type="text" id="input" style="width: 300px;">
  <button id="send">Send</button>

  <script>
    const API = 'https://locsync-voice-bot.onrender.com';
    const TENANT = 'TENANT-136';
    
    let client = null;
    let conversation = null;
    
    const msgs = document.getElementById('messages');
    const inp = document.getElementById('input');
    const btn = document.getElementById('send');
    
    function log(text) {
      console.log(text);
      msgs.innerHTML += text + '<br>';
      msgs.scrollTop = msgs.scrollHeight;
    }
    
    // Get access token and start
    log('Requesting token...');
    
    fetch(`${API}/webchat/${TENANT}/token`, { method: 'POST' })
      .then(r => {
        log('Token response received');
        return r.json();
      })
      .then(async d => {
        log('Token: ' + d.token.substring(0, 20) + '...');
        log('Conversation SID: ' + d.conversationSid);
        log('Initializing Twilio client...');
        
        try {
          client = await Twilio.Conversations.Client.create(d.token);
          log('Client created successfully!');
          
          conversation = await client.getConversationBySid(d.conversationSid);
          log('Conversation joined!');
          
          conversation.on('messageAdded', (message) => {
            log('Message received: ' + message.author);
            if (message.author !== client.user.identity) {
              log('Bot: ' + message.body);
            }
          });
          
          log('Connected! Type a message.');
        } catch (err) {
          log('ERROR: ' + err.message);
          log('Full error: ' + JSON.stringify(err));
        }
      })
      .catch(err => {
        log('Fetch error: ' + err.message);
      });
    
    // Send message
    btn.onclick = async () => {
      const text = inp.value.trim();
      if (!text || !conversation) {
        log('Cannot send: ' + (!text ? 'empty message' : 'no conversation'));
        return;
      }
      
      log('You: ' + text);
      inp.value = '';
      
      try {
        await conversation.sendMessage(text);
        log('Message sent!');
      } catch (err) {
        log('Send error: ' + err.message);
      }
    };
    
    inp.onkeypress = (e) => { if (e.key === 'Enter') btn.click(); };
  </script>
</body>
</html>
