<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LocSync Chat</title>
  <script src="https://media.twiliocdn.com/sdk/js/conversations/v2.4/twilio-conversations.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    #chat-container {
      width: 100%;
      max-width: 450px;
      height: 650px;
      background: white;
      border: 3px solid #FFD700;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #chat-header {
      background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
      color: #000;
      padding: 24px;
      font-size: 20px;
      font-weight: 700;
      text-align: center;
      border-bottom: 3px solid #000;
    }
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      background: white;
    }
    #messages::-webkit-scrollbar {
      width: 8px;
    }
    #messages::-webkit-scrollbar-track {
      background: #f1f1f1;
    }
    #messages::-webkit-scrollbar-thumb {
      background: #FFD700;
      border-radius: 4px;
    }
    .message {
      padding: 14px 18px;
      border-radius: 20px;
      max-width: 80%;
      word-wrap: break-word;
      line-height: 1.5;
    }
    .bot {
      background: white;
      color: #000;
      align-self: flex-start;
      border: 2px solid #FFD700;
      box-shadow: 0 2px 8px rgba(255, 215, 0, 0.2);
    }
    .user {
      background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
      color: #000;
      align-self: flex-end;
      font-weight: 600;
      border: 2px solid #000;
    }
    #input-area {
      display: flex;
      padding: 20px;
      border-top: 3px solid #FFD700;
      gap: 12px;
      background: white;
    }
    #message-input {
      flex: 1;
      padding: 14px 18px;
      border: 2px solid #FFD700;
      border-radius: 28px;
      outline: none;
      font-size: 15px;
      background: white;
      color: #000;
      font-family: inherit;
    }
    #message-input::placeholder {
      color: #999;
    }
    #message-input:focus {
      border-color: #FFA500;
      box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.1);
    }
    #send-btn {
      background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
      color: #000;
      border: 2px solid #000;
      padding: 14px 28px;
      border-radius: 28px;
      cursor: pointer;
      font-weight: 700;
      font-size: 15px;
      transition: all 0.2s;
      font-family: inherit;
    }
    #send-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(255, 215, 0, 0.4);
    }
    #send-btn:active {
      transform: translateY(0);
    }
    #send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    @media (max-width: 500px) {
      #chat-container {
        height: 100vh;
        max-width: 100%;
        border-radius: 0;
      }
    }
  </style>
</head>
<body>
  <div id="chat-container">
    <div id="chat-header">Chat with Us</div>
    <div id="messages"></div>
    <div id="input-area">
      <input type="text" id="message-input" placeholder="Ask about our services..." disabled>
      <button id="send-btn" disabled>Send</button>
    </div>
  </div>
  <script>
    const API = 'https://locsync-voice-bot.onrender.com';
    const TENANT = 'TENANT-136';
    let client = null;
    let conversation = null;
    const messagesDiv = document.getElementById('messages');
    const input = document.getElementById('message-input');
    const sendBtn = document.getElementById('send-btn');
    function addMessage(type, text) {
      const msg = document.createElement('div');
      msg.className = `message ${type}`;
      msg.textContent = text;
      messagesDiv.appendChild(msg);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }
    addMessage('bot', 'Connecting...');
    fetch(`${API}/webchat/${TENANT}/token`, { method: 'POST' })
      .then(r => r.json())
      .then(async d => {
        client = await Twilio.Conversations.Client.create(d.token);
        conversation = await client.getConversationBySid(d.conversationSid);
        conversation.on('messageAdded', (message) => {
          if (message.author !== client.user.identity) {
            addMessage('bot', message.body);
          }
        });
        input.disabled = false;
        sendBtn.disabled = false;
        input.focus();
        messagesDiv.innerHTML = '';
      })
      .catch(err => {
        addMessage('bot', 'Connection error. Please refresh the page.');
        console.error('Init error:', err);
      });
    async function sendMessage() {
      const text = input.value.trim();
      if (!text || !conversation) return;
      addMessage('user', text);
      input.value = '';
      try {
        await conversation.sendMessage(text);
      } catch (err) {
        addMessage('bot', 'Failed to send. Please try again.');
        console.error('Send error:', err);
      }
    }
    sendBtn.onclick = sendMessage;
    input.onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };
  </script>
</body>
</html>
